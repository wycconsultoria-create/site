<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f3f9;color:#1a1a2e;font-size:15px}

/* LOGIN */

/* APP */
.app{display:none}
.topbar{background:#042C53;padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-wrap:nowrap}

.tabs{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;margin:0 6px}

.tb{padding:7px 12px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.tb.on{background:rgba(255,255,255,.15);color:#fff;font-weight:700}

.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

.add-btn:hover{background:#854F0B}

.logout-btn:hover{background:rgba(255,255,255,.1);color:#fff}

.wrap{max-width:1200px;margin:0 auto;padding:14px 12px}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}

.metric-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.metric-val{font-size:26px;font-weight:800}
.mv-blue{color:#042C53}.mv-amber{color:#854F0B}.mv-green{color:#27500A}.mv-red{color:#A32D2D}

.alertas{margin-bottom:12px}
.alert-box{background:#FAEEDA;border-left:4px solid #BA7517;border-radius:10px;padding:12px 14px;font-size:13px;color:#633806}
.alert-box strong{display:block;margin-bottom:8px;font-size:13px;font-weight:700}
.alert-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #FAC775;gap:8px;flex-wrap:wrap}

.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}

.btn{padding:5px 10px;border-radius:7px;border:1px solid #d0d4e0;background:#fff;color:#444;font-size:11px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}

.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e8eaf0}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;min-width:600px}
th{text-align:left;padding:10px 12px;color:#888;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e8eaf0;background:#f9fafb}

.charts-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:640px){.charts-grid{grid-template-columns:1fr 1fr}}
.chart-card{background:#fff;border-radius:12px;padding:16px;border:1px solid #e8eaf0}
.chart-title{font-size:13px;font-weight:700;color:#042C53;margin-bottom:14px}
.conv-big{font-size:36px;font-weight:800;color:#3B6D11;text-align:center;padding:20px 0 8px}
.conv-sub{font-size:13px;color:#888;text-align:center;margin-bottom:8px}
.funnel-bar{margin-bottom:8px}
.funnel-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.funnel-track{background:#f0f3f9;border-radius:6px;height:18px;overflow:hidden}

.hist-card{background:#fff;border:1px solid #e8eaf0;border-radius:12px;padding:14px 16px;margin-bottom:12px}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(4,44,83,.6);z-index:200;align-items:flex-end;justify-content:center}

.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}

.modal-handle{width:40px;height:4px;background:#e0e4ee;border-radius:4px;margin:0 auto 20px;display:block}

.modal h3{font-size:17px;font-weight:800;margin-bottom:16px;color:#042C53}
.field{margin-bottom:12px}
.field label{font-size:11px;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:10px 12px;border-radius:9px;border:1.5px solid #e0e4ee;font-family:inherit;color:#1a1a2e;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#185FA5}

.sync-ok{color:#9FE1CB}.sync-err{color:#F09595}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
</style>

<body>

<script>
const SUPABASE_URL = 'https://ayissdubhjdbhlyzkjrc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aXNzZHViaGpkYmhseXpranJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTUzNTcsImV4cCI6MjA5NTg5MTM1N30.llGAxqfnaBpkQ_kCk1bYcsmoviNv4hgmB-wIpdBP0Ws';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ETAPAS=[
  {id:'novo',label:'Novo contato',color:'#0C447C'},
  {id:'email1',label:'Email enviado',color:'#633806'},
  {id:'followup',label:'Follow-up',color:'#27500A'},
  {id:'zap',label:'WhatsApp',color:'#085041'},
  {id:'cliente',label:'Cliente',color:'#3B6D11'},
  {id:'nao',label:'Sem interesse',color:'#791F1F'}
];

let contacts = [];
let editId = null;
let chartSeg = null, chartTimeline = null;

// AUTH
function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  if(u==='admin'&&p==='Preto01@'){
    btn.innerHTML='<i class="ti ti-loader spin"></i> Carregando...';
    btn.disabled=true;
    document.getElementById('login-err').style.display='none';
    loadContacts().then(()=>{
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='block';
      render();
    }).catch(()=>{
      btn.innerHTML='<i class="ti ti-lock"></i> Entrar';
      btn.disabled=false;
      document.getElementById('login-err').textContent='Erro ao conectar. Verifique sua internet.';
      document.getElementById('login-err').style.display='block';
    });
  } else {
    document.getElementById('login-err').textContent='Usuário ou senha incorretos.';
    document.getElementById('login-err').style.display='block';
  }
}
function doLogout(){
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pass').value='';
  document.getElementById('login-btn').innerHTML='<i class="ti ti-lock"></i> Entrar';
  document.getElementById('login-btn').disabled=false;
  contacts=[];
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('login-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pass').focus();});

// SYNC INDICATOR
function setSyncStatus(status){
  const el=document.getElementById('sync-indicator');
  const txt=document.getElementById('sync-txt');
  if(!el)return;
  if(status==='ok'){el.className='sync-indicator sync-ok';txt.textContent='Salvo';}
  else if(status==='saving'){el.className='sync-indicator';txt.innerHTML='<i class="ti ti-loader spin"></i> Salvando...';}
  else if(status==='err'){el.className='sync-indicator sync-err';txt.textContent='Erro ao salvar';}
  else{el.className='sync-indicator sync-ok';txt.textContent='Conectado';}
}

// SUPABASE CRUD
async function loadContacts(){
  const {data,error}=await sb.from('contatos').select('*').order('created_at',{ascending:false});
  if(error)throw error;
  contacts=data.map(r=>({
    id:r.id, empresa:r.empresa, resp:r.resp, email:r.email, zap:r.zap,
    seg:r.seg, segCustom:r.seg_custom, obs:r.obs, etapa:r.etapa,
    criadoEm:r.criado_em, dataEmail1:r.data_email1,
    dataFollowup:r.data_followup, dataZap:r.data_zap,
    historico:r.historico||[]
  }));
}

function toRow(c){
  return {
    empresa:c.empresa, resp:c.resp||null, email:c.email||null, zap:c.zap||null,
    seg:c.seg||null, seg_custom:c.segCustom||null, obs:c.obs||null,
    etapa:c.etapa, criado_em:c.criadoEm,
    data_email1:c.dataEmail1||null, data_followup:c.dataFollowup||null,
    data_zap:c.dataZap||null, historico:c.historico||[]
  };
}

async function upsertContact(c){
  setSyncStatus('saving');
  const row=toRow(c);
  let res;
  if(c.id&&c.id.includes('-')){
    res=await sb.from('contatos').update(row).eq('id',c.id);
  } else {
    res=await sb.from('contatos').insert(row).select().single();
    if(res.data)c.id=res.data.id;
  }
  if(res.error){setSyncStatus('err');console.error(res.error);}
  else setSyncStatus('ok');
}

async function deleteContact(id){
  setSyncStatus('saving');
  const {error}=await sb.from('contatos').delete().eq('id',id);
  if(error){setSyncStatus('err');console.error(error);}
  else setSyncStatus('ok');
}

// HELPERS
function today(){return new Date().toISOString().slice(0,10);}
function daysDiff(d){if(!d)return 999;return Math.floor((Date.now()-new Date(d))/86400000);}
function fmtDate(d){if(!d)return '';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function getSeg(c){return c.segCustom||c.seg||'—';}
function checkSeg(){
  const v=document.getElementById('f-seg').value;
  document.getElementById('seg-custom').classList.toggle('on',v==='Outro — informar abaixo');
}

// MODAL
function openModal(id){
  editId=id||null;
  if(id){
    const c=contacts.find(x=>x.id===id);
    document.getElementById('modal-title').textContent='Editar contato';
    document.getElementById('f-empresa').value=c.empresa||'';
    document.getElementById('f-resp').value=c.resp||'';
    document.getElementById('f-email').value=c.email||'';
    document.getElementById('f-zap').value=c.zap||'';
    document.getElementById('f-seg').value=c.seg||'';
    document.getElementById('f-seg-custom').value=c.segCustom||'';
    document.getElementById('f-obs').value=c.obs||'';
    checkSeg();
  } else {
    document.getElementById('modal-title').textContent='Novo contato';
    ['f-empresa','f-resp','f-email','f-zap','f-obs','f-seg-custom'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-seg').value='';
    document.getElementById('seg-custom').classList.remove('on');
  }
  document.getElementById('modal-bg').classList.add('on');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('on');}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});

async function saveContact(){
  const empresa=document.getElementById('f-empresa').value.trim();
  if(!empresa){alert('Informe o nome da empresa.');return;}
  const btn=document.getElementById('save-btn');
  btn.innerHTML='<i class="ti ti-loader spin"></i>';
  btn.disabled=true;
  const seg=document.getElementById('f-seg').value;
  const segCustom=seg==='Outro — informar abaixo'?document.getElementById('f-seg-custom').value.trim():'';
  if(editId){
    const c=contacts.find(x=>x.id===editId);
    Object.assign(c,{empresa,resp:document.getElementById('f-resp').value.trim(),
      email:document.getElementById('f-email').value.trim(),
      zap:document.getElementById('f-zap').value.trim(),seg,segCustom,
      obs:document.getElementById('f-obs').value.trim()});
    await upsertContact(c);
  } else {
    const c={id:'new-'+Date.now(),empresa,resp:document.getElementById('f-resp').value.trim(),
      email:document.getElementById('f-email').value.trim(),
      zap:document.getElementById('f-zap').value.trim(),seg,segCustom,
      obs:document.getElementById('f-obs').value.trim(),
      etapa:'novo',criadoEm:today(),
      historico:[{data:today(),acao:'Contato cadastrado',tipo:'novo'}]};
    contacts.unshift(c);
    await upsertContact(c);
  }
  btn.innerHTML='Salvar';btn.disabled=false;
  closeModal();render();
}

async function mover(id,etapa){
  const c=contacts.find(x=>x.id===id);
  const lbl={email1:'Email inicial enviado',followup:'Follow-up enviado',zap:'Contato via WhatsApp',
    cliente:'Convertido em cliente',nao:'Marcado sem interesse',novo:'Reaberto para prospecção'};
  c.etapa=etapa;
  if(etapa==='email1')c.dataEmail1=today();
  if(etapa==='followup')c.dataFollowup=today();
  if(etapa==='zap')c.dataZap=today();
  c.historico=c.historico||[];
  c.historico.push({data:today(),acao:lbl[etapa]||etapa,tipo:etapa});
  await upsertContact(c);
  render();
}

async function remover(id){
  if(!confirm('Remover este contato?'))return;
  contacts=contacts.filter(x=>x.id!==id);
  await deleteContact(id);
  render();
}

async function addNota(id){
  const el=document.getElementById('nota-'+id);
  if(!el||!el.value.trim())return;
  const c=contacts.find(x=>x.id===id);
  c.historico=c.historico||[];
  c.historico.push({data:today(),acao:el.value.trim(),tipo:'nota'});
  el.value='';
  await upsertContact(c);
  render();
}

// RENDER HELPERS
function badgeEtapa(e){
  const m={novo:'b-novo',email1:'b-email',followup:'b-followup',zap:'b-zap',cliente:'b-cliente',nao:'b-nao'};
  const l={novo:'Novo',email1:'Email',followup:'Follow-up',zap:'WhatsApp',cliente:'Cliente',nao:'Sem interesse'};
  return `<span class="badge ${m[e]||'b-novo'}">${l[e]||e}</span>`;
}
function datesLine(c){
  const p=[];
  if(c.criadoEm)p.push('Cadastro: '+fmtDate(c.criadoEm));
  if(c.dataEmail1)p.push('Email: '+fmtDate(c.dataEmail1));
  if(c.dataFollowup)p.push('Follow-up: '+fmtDate(c.dataFollowup));
  if(c.dataZap)p.push('Zap: '+fmtDate(c.dataZap));
  return p.join('<br>');
}
function cardActions(c){
  let b='';
  if(c.etapa==='novo')b+=`<button class="btn primary" onclick="mover('${c.id}','email1')"><i class="ti ti-mail"></i> Email feito</button>`;
  if(c.etapa==='email1')b+=`<button class="btn primary" onclick="mover('${c.id}','followup')"><i class="ti ti-clock"></i> Follow-up</button>`;
  if(c.etapa==='followup')b+=`<button class="btn primary" onclick="mover('${c.id}','zap')"><i class="ti ti-brand-whatsapp"></i> Zap feito</button>`;
  if(c.etapa==='zap')b+=`<button class="btn green" onclick="mover('${c.id}','cliente')"><i class="ti ti-check"></i> Cliente!</button>`;
  if(c.etapa!=='cliente'&&c.etapa!=='nao')b+=`<button class="btn danger" onclick="mover('${c.id}','nao')"><i class="ti ti-x"></i> Sem int.</button>`;
  if(c.etapa==='nao'||c.etapa==='cliente')b+=`<button class="btn" onclick="mover('${c.id}','novo')"><i class="ti ti-refresh"></i> Reabrir</button>`;
  b+=`<button class="btn" onclick="openModal('${c.id}')"><i class="ti ti-edit"></i></button>`;
  b+=`<button class="btn danger" onclick="remover('${c.id}')"><i class="ti ti-trash"></i></button>`;
  return b;
}

// PANELS
function renderMetrics(){
  const tot=contacts.length;
  const ativ=contacts.filter(c=>c.etapa!=='nao'&&c.etapa!=='cliente').length;
  const cli=contacts.filter(c=>c.etapa==='cliente').length;
  const pend=contacts.filter(c=>(c.etapa==='email1'&&daysDiff(c.dataEmail1)>=3)||(c.etapa==='followup'&&daysDiff(c.dataFollowup)>=3)).length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total contatos</div><div class="metric-val mv-blue">${tot}</div></div>
    <div class="metric"><div class="metric-label">Em prospecção</div><div class="metric-val mv-amber">${ativ}</div></div>
    <div class="metric"><div class="metric-label">Clientes</div><div class="metric-val mv-green">${cli}</div></div>
    <div class="metric"><div class="metric-label">Pendentes</div><div class="metric-val mv-red${pend>0?' pulse':''}">${pend}</div></div>`;
}

function renderAlertas(){
  const urg=contacts.filter(c=>(c.etapa==='email1'&&daysDiff(c.dataEmail1)>=3)||(c.etapa==='followup'&&daysDiff(c.dataFollowup)>=3));
  if(!urg.length){document.getElementById('alertas').innerHTML='';return;}
  let h=`<div class="alert-box"><strong>Ações pendentes hoje (${urg.length})</strong>`;
  urg.forEach(c=>{
    const dias=c.etapa==='email1'?daysDiff(c.dataEmail1):daysDiff(c.dataFollowup);
    const msg=c.etapa==='email1'?`<strong>Follow-up</strong> para <strong>${c.empresa}</strong> — ${dias}d sem retorno`:`<strong>WhatsApp</strong> para <strong>${c.empresa}</strong> — ${dias}d`;
    const prox=c.etapa==='email1'?'followup':'zap';
    h+=`<div class="alert-item"><span>${msg}</span><button class="btn primary" onclick="mover('${c.id}','${prox}')" style="font-size:12px;padding:5px 10px">Feito</button></div>`;
  });
  h+='</div>';
  document.getElementById('alertas').innerHTML=h;
}

function renderKanban(){
  let h='<div class="kanban">';
  ETAPAS.forEach(et=>{
    const cols=contacts.filter(c=>c.etapa===et.id);
    h+=`<div class="col"><div class="col-head" style="color:${et.color}">${et.label}<span class="col-count">${cols.length}</span></div>`;
    if(!cols.length)h+='<div class="empty">Vazio</div>';
    cols.forEach(c=>{
      const urg=(c.etapa==='email1'&&daysDiff(c.dataEmail1)>=3)||(c.etapa==='followup'&&daysDiff(c.dataFollowup)>=3);
      h+=`<div class="card" style="${urg?'border-left:3px solid #BA7517':''}">
        <div class="card-name">${c.empresa}</div>
        <div class="card-seg">${getSeg(c)}${c.resp?' · '+c.resp:''}</div>
        <div class="card-dates">${datesLine(c)}</div>
        <div class="card-actions">${cardActions(c)}</div>
      </div>`;
    });
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('panel-kanban').innerHTML=h;
}

function renderLista(){
  if(!contacts.length){document.getElementById('panel-lista').innerHTML='<div class="empty">Nenhum contato cadastrado.</div>';return;}
  let h='<div class="table-wrap"><table><thead><tr><th>Empresa</th><th>Segmento</th><th>Responsável</th><th>Etapa</th><th>Última ação</th><th></th></tr></thead><tbody>';
  contacts.forEach(c=>{
    const ul=c.historico&&c.historico.length?c.historico[c.historico.length-1]:null;
    h+=`<tr><td><strong style="color:#042C53">${c.empresa}</strong>${c.email?'<br><span style="font-size:11px;color:#888">'+c.email+'</span>':''}</td>
      <td style="color:#888;font-size:12px">${getSeg(c)}</td>
      <td style="color:#888;font-size:12px">${c.resp||'—'}</td>
      <td>${badgeEtapa(c.etapa)}</td>
      <td style="color:#aaa;font-size:11px">${ul?fmtDate(ul.data)+'<br>'+ul.acao:'—'}</td>
      <td><div style="display:flex;gap:4px;flex-wrap:wrap">${cardActions(c)}</div></td>
    </tr>`;
  });
  h+='</tbody></table></div>';
  document.getElementById('panel-lista').innerHTML=h;
}

function renderAnalytics(){
  const tot=contacts.length;
  const cli=contacts.filter(c=>c.etapa==='cliente').length;
  const nao=contacts.filter(c=>c.etapa==='nao').length;
  const conv=tot>0?Math.round((cli/tot)*100):0;
  const counts=ETAPAS.map(e=>contacts.filter(c=>c.etapa===e.id).length);
  const maxC=Math.max(...counts,1);
  let funnelHtml=ETAPAS.map((e,i)=>{
    const pct=Math.round((counts[i]/maxC)*100);
    return `<div class="funnel-bar"><div class="funnel-label"><span style="color:${e.color};font-weight:600">${e.label}</span><span style="font-weight:700">${counts[i]}</span></div>
    <div class="funnel-track"><div class="funnel-fill" style="width:${pct}%;background:${e.color}"></div></div></div>`;
  }).join('');
  const segMap={};
  contacts.forEach(c=>{const s=getSeg(c);segMap[s]=(segMap[s]||0)+1;});
  const segLabels=Object.keys(segMap);
  const segVals=Object.values(segMap);
  const segColors=['#042C53','#185FA5','#378ADD','#BA7517','#EF9F27','#3B6D11','#639922','#791F1F','#085041','#1D9E75'];
  const days30=[];
  for(let i=29;i>=0;i--){const d=new Date(Date.now()-i*86400000);days30.push(d.toISOString().slice(0,10));}
  const tlCounts=days30.map(d=>contacts.filter(c=>c.criadoEm===d).length);
  const tlLabels=days30.map(d=>{const p=d.split('-');return p[2]+'/'+p[1];});
  document.getElementById('panel-analytics').innerHTML=`
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Taxa de conversão</div>
        <div class="conv-big">${conv}%</div>
        <div class="conv-sub">${cli} cliente${cli!==1?'s':''} de ${tot} contato${tot!==1?'s':''}</div>
        <div style="font-size:12px;color:#aaa;text-align:center">${nao} sem interesse</div>
      </div>
      <div class="chart-card"><div class="chart-title">Funil por etapa</div>${funnelHtml||'<div class="empty">Sem dados</div>'}</div>
      <div class="chart-card"><div class="chart-title">Por segmento</div><canvas id="chart-seg" height="220"></canvas></div>
      <div class="chart-card"><div class="chart-title">Novos contatos — 30 dias</div><canvas id="chart-timeline" height="220"></canvas></div>
    </div>`;
  if(chartSeg)chartSeg.destroy();
  const ctxS=document.getElementById('chart-seg');
  if(ctxS&&segLabels.length){chartSeg=new Chart(ctxS,{type:'doughnut',data:{labels:segLabels,datasets:[{data:segVals,backgroundColor:segColors.slice(0,segLabels.length),borderWidth:2,borderColor:'#fff'}]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}}},cutout:'60%'}});}
  if(chartTimeline)chartTimeline.destroy();
  const ctxT=document.getElementById('chart-timeline');
  if(ctxT){chartTimeline=new Chart(ctxT,{type:'bar',data:{labels:tlLabels,datasets:[{data:tlCounts,backgroundColor:'#B5D4F4',borderColor:'#185FA5',borderWidth:1,borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:45},grid:{display:false}},y:{ticks:{stepSize:1,font:{size:11}},grid:{color:'#f0f3f9'}}}}});}
}

function renderHist(){
  const cores={novo:'#378ADD',email1:'#BA7517',followup:'#639922',zap:'#1D9E75',cliente:'#3B6D11',nao:'#E24B4A',nota:'#888'};
  let h='';
  contacts.filter(c=>c.historico&&c.historico.length).forEach(c=>{
    h+=`<div class="hist-card"><div class="hist-name"><span>${c.empresa} <span style="font-size:12px;font-weight:400;color:#888">${getSeg(c)}</span></span>${badgeEtapa(c.etapa)}</div>`;
    [...c.historico].reverse().forEach(hh=>{
      h+=`<div class="hist-item"><div class="hist-dot" style="background:${cores[hh.tipo]||'#888'}"></div><div><span style="font-size:11px;color:#aaa">${fmtDate(hh.data)}</span>&nbsp;&nbsp;<span style="font-size:13px">${hh.acao}</span></div></div>`;
    });
    h+=`<textarea class="note-area" id="nota-${c.id}" placeholder="Adicionar anotação..."></textarea>`;
    h+=`<button class="btn" onclick="addNota('${c.id}')" style="margin-top:6px;font-size:12px"><i class="ti ti-notes"></i> Salvar anotação</button>`;
    h+='</div>';
  });
  if(!h)h='<div class="empty">Nenhum histórico ainda.</div>';
  document.getElementById('panel-hist').innerHTML=h;
}

function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='analytics')renderAnalytics();
}

function render(){
  renderMetrics();renderAlertas();renderKanban();renderLista();renderHist();
  if(document.getElementById('panel-analytics').classList.contains('on'))renderAnalytics();
}
</script>
</body>
</html>
