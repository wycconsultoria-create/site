 <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wyc Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
:root{
  --bg-primary:#f0f4fb;--bg-secondary:#ffffff;--bg-card:#f8faff;--bg-card-hover:#eef2fc;
  --border:rgba(59,130,246,.18);--border-focus:rgba(59,130,246,.55);
  --accent:#2563eb;--accent-glow:rgba(37,99,235,.25);--accent-2:#6366f1;
  --text-primary:#0f172a;--text-secondary:#334155;--text-muted:#64748b;
  --success:#16a34a;--danger:#dc2626;--warning:#d97706;
  --radius-sm:6px;--radius-md:12px;--radius-lg:20px;--radius-xl:28px;
  --shadow-card:0 2px 12px rgba(37,99,235,.07);
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --sidebar-w:240px;--topbar-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-secondary)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700}
h2{font-size:1.5rem}h3{font-size:1.15rem}
p{color:var(--text-secondary)}a{text-decoration:none;color:inherit}
#app{display:flex;min-height:100vh}
#app.fullscreen{display:block}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:.85rem;color:#fff}
.logo-text{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--text-primary)}
.logo-text span{color:var(--accent)}
.sidebar-section-label{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:0 20px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text-secondary);transition:all .2s;font-weight:500}
.nav-item:hover{background:var(--bg-card);color:var(--text-primary)}
.nav-item.active{background:rgba(37,99,235,.1);color:var(--accent);border-right:3px solid var(--accent)}
.nav-icon{font-size:1.1rem;min-width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:16px 20px 0;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-card);border-radius:var(--radius-md);cursor:pointer;transition:background .2s;margin-bottom:8px}
.user-card:hover{background:var(--bg-card-hover)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#fff;flex-shrink:0}
.user-info{flex:1;overflow:hidden}
.user-name{font-weight:600;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-email{font-size:.7rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-logout{width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;border:1px solid rgba(220,38,38,.2);background:rgba(220,38,38,.06);color:#dc2626;font-family:var(--font-body);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:rgba(220,38,38,.12)}

/* MAIN */
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);z-index:50}
.topbar-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700}
.topbar-subtitle{font-size:.8rem;color:var(--text-muted)}
.topbar-actions{margin-left:auto;display:flex;gap:10px}
.menu-btn{display:none;background:none;border:none;cursor:pointer;font-size:1.4rem;padding:4px;color:var(--text-primary);flex-shrink:0}
.page-content{padding:28px;flex:1}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-card)}
.empresa-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;display:flex;flex-direction:column;gap:14px;transition:all .2s;box-shadow:var(--shadow-card)}
.empresa-card:hover{border-color:var(--border-focus);box-shadow:0 6px 20px rgba(37,99,235,.12);transform:translateY(-2px)}
.empresa-card-top{display:flex;align-items:center;gap:12px}
.empresa-card-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.empresa-avatar{width:48px;height:48px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff;flex-shrink:0;overflow:hidden}
.empresa-info{flex:1;overflow:hidden}
.empresa-name{font-weight:700;font-size:1rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empresa-email{font-size:.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empresa-badge{font-size:.68rem;font-weight:600;background:rgba(22,163,74,.12);color:var(--success);border:1px solid rgba(22,163,74,.25);padding:2px 8px;border-radius:99px}
.empresa-actions{display:flex;gap:6px;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-family:var(--font-body);font-weight:600;font-size:.82rem;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(37,99,235,.3)}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-focus);color:var(--text-primary)}
.btn-danger{background:rgba(220,38,38,.1);color:var(--danger);border:1px solid rgba(220,38,38,.25)}
.btn-danger:hover{background:rgba(220,38,38,.2)}
.btn-icon{width:32px;height:32px;padding:0;border-radius:var(--radius-sm)}
.btn-sm{padding:6px 12px;font-size:.78rem}

/* FORMS */
.form-group{margin-bottom:16px}
.form-label{display:block;font-weight:600;font-size:.75rem;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text-primary);font-family:var(--font-body);font-size:.88rem;transition:border-color .2s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.form-select{appearance:none;cursor:pointer}
.form-textarea{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:slideUp .25s ease}
.modal-wide{max-width:720px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.3rem;line-height:1;padding:4px;transition:color .2s}
.modal-close:hover{color:var(--text-primary)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}

/* CONTACT ITEM */
.contact-item{display:grid;grid-template-columns:160px 1fr 1fr auto;gap:10px;align-items:center;padding:12px 16px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:8px}
.contact-item:hover{border-color:var(--border-focus)}
.contact-type-badge{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);font-weight:600;font-size:.75rem;border:1px solid}
.contact-remove{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem;transition:color .2s;padding:4px}
.contact-remove:hover{color:var(--danger)}

/* PUBLIC CARD */
.public-card-wrapper{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;padding:24px;background:linear-gradient(135deg,#0a0f1e 0%,#0f172a 50%,#0a0f1e 100%)}
.public-card{width:100%;max-width:360px;background:#1e293b;border-radius:var(--radius-xl);overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.08);animation:cardAppear .5s ease forwards}
.public-card-header{padding:36px 28px 24px;text-align:center;background:linear-gradient(180deg,rgba(37,99,235,.1) 0%,transparent 100%)}
.public-card-avatar{width:88px;height:88px;border-radius:50%;margin:0 auto 16px;border:3px solid var(--accent);object-fit:cover;box-shadow:0 0 0 4px rgba(37,99,235,.2);display:block}
.public-card-avatar-placeholder{width:88px;height:88px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:2rem;color:#fff;border:3px solid var(--accent);box-shadow:0 0 0 4px rgba(37,99,235,.2)}
.public-card-name{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:#f1f5f9;line-height:1.2;margin-bottom:4px}
.public-card-company{font-size:.85rem;color:#94a3b8;margin-bottom:4px}
.public-card-bio{font-size:.82rem;color:#94a3b8;line-height:1.5;margin-top:8px}
.public-card-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(37,99,235,.2);color:#93c5fd;border:1px solid rgba(37,99,235,.4);font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:99px;margin-bottom:12px}
.public-card-contacts{padding:0 20px 28px;display:flex;flex-direction:column;gap:10px}
.public-contact-btn{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--radius-md);cursor:pointer;border:none;font-family:var(--font-body);font-weight:600;font-size:.88rem;transition:all .2s;text-align:left;width:100%}
.public-contact-btn:hover{opacity:.88;transform:translateY(-1px)}
.public-contact-btn:active{transform:scale(.98)}
.public-contact-icon{font-size:1.2rem;min-width:24px;text-align:center}
.public-contact-label{flex:1}
.public-contact-sublabel{font-size:.72rem;opacity:.75;font-weight:400;display:block}
.public-card-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);text-align:center;font-size:.7rem;color:#475569;display:flex;align-items:center;justify-content:center;gap:6px}

/* QR */
.qr-canvas-wrapper{background:#fff;border-radius:var(--radius-md);padding:20px;display:inline-block;margin:16px 0;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.qr-url{font-size:.72rem;color:var(--text-muted);background:var(--bg-primary);padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);word-break:break-all;font-family:monospace;margin-bottom:16px}

/* TOAST */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 18px;font-size:.84rem;font-weight:500;box-shadow:var(--shadow-card);animation:slideInRight .3s ease;min-width:240px}
.toast.success{border-color:rgba(22,163,74,.4)}.toast.error{border-color:rgba(220,38,38,.4)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;grid-column:1/-1}
.empty-state-icon{font-size:3rem;opacity:.3}
.empty-state-title{font-family:var(--font-display);font-size:1.2rem}
.empty-state-text{color:var(--text-muted);max-width:320px;font-size:.88rem}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.urgency-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(220,38,38,.12);color:var(--danger);border:1px solid rgba(220,38,38,.3);border-radius:var(--radius-sm);padding:3px 8px;font-size:.68rem;font-weight:700}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.color-swatch:hover,.color-swatch.selected{border-color:#fff;transform:scale(1.15);box-shadow:0 0 0 2px var(--accent)}
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:var(--bg-primary);border-radius:var(--radius-md);padding:4px;margin-bottom:24px}
.tab{flex:1;padding:8px 14px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text-secondary);font-family:var(--font-body);font-weight:600;font-size:.82rem;cursor:pointer;transition:all .2s}
.tab.active{background:var(--bg-secondary);color:var(--text-primary);box-shadow:var(--shadow-card)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes cardAppear{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}

.mt-4{margin-top:16px}.mb-4{margin-bottom:16px}.w-full{width:100%}.text-center{text-align:center}
.text-sm{font-size:.82rem}.text-xs{font-size:.72rem}.text-muted{color:var(--text-muted)}.font-bold{font-weight:700}

/* ── Mobile ── */
@media(max-width:768px){
  /* Sidebar vira drawer — oculta por padrão */
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;box-shadow:none}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.18)}
  /* Overlay escuro quando sidebar aberta */
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  .sidebar-overlay.open{display:block}
  /* Conteúdo ocupa tela toda */
  .main-content{margin-left:0!important}
  /* Topbar mobile */
  .topbar{padding:0 16px;gap:10px}
  .topbar-title{font-size:1rem}
  .topbar-subtitle{display:none}
  /* Botão hamburguer */
  .menu-btn{display:flex!important}
  /* Cards em coluna única */
  .contact-item{grid-template-columns:1fr;grid-template-rows:auto}
  .form-grid{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr}
  /* Editor em coluna única */
  .page-content [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
  /* Topbar actions wrap */
  .topbar-actions{gap:6px}
  .topbar-actions .btn{font-size:.72rem;padding:7px 10px}
}
/* ── Public Card Actions ── */
.public-card-actions{display:flex;gap:8px;padding:0 20px 20px}
.public-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 8px;border-radius:var(--radius-md);border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#cbd5e1;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font-body);text-decoration:none}
.public-action-btn:hover{background:rgba(255,255,255,.1);color:#f1f5f9;transform:translateY(-1px)}
.public-action-btn:active{transform:scale(.97)}
.scan-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:99px;padding:3px 10px;font-size:.68rem;color:#64748b;margin-bottom:10px}
.install-banner{margin:0 20px 16px;padding:12px 14px;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.25);border-radius:var(--radius-md);display:flex;align-items:flex-start;gap:10px}
.install-banner-text{flex:1;font-size:.74rem;color:#93c5fd;line-height:1.5}
.install-banner-close{background:none;border:none;color:#475569;cursor:pointer;font-size:.9rem;padding:2px;line-height:1;flex-shrink:0;margin-top:2px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// =========================================================
//  WYC CONNECT – Single File Bundle
// =========================================================

// ── STORE ─────────────────────────────────────────────────
// Dados ficam no localStorage E num arquivo db.json no GitHub
// O db.json é lido publicamente (cartões) e escrito via API token (admin)
const STORE_KEY   = 'wyc_connect_data';
const AUTH_KEY    = 'wyc_auth';
const SESSION_KEY = 'wyc_session';
const SESSION_TTL = 8 * 60 * 60 * 1000;
const DEFAULT_DATA = { user:{ name:'Usuário WYC', email:'' }, empresas:[], cartoes:[] };

// GitHub config — preenchido na primeira configuração
function getGHConfig(){ try{ return JSON.parse(localStorage.getItem('wyc_gh')||'null'); }catch{ return null; } }
function saveGHConfig(c){ localStorage.setItem('wyc_gh',JSON.stringify(c)); }

// ── Leitura local (síncrona) ──────────────────────────────
function loadData(){
  try{ const r=localStorage.getItem(STORE_KEY); return r?{...JSON.parse(JSON.stringify(DEFAULT_DATA)),...JSON.parse(r)}:JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  catch{ return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData(d){ localStorage.setItem(STORE_KEY,JSON.stringify(d)); }

// ── Sincronização GitHub (async) ──────────────────────────
async function ghGet(){
  const gh=getGHConfig(); if(!gh) return null;
  try{
    const r=await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.path}`,
      {headers:{'Authorization':'token '+gh.token,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) return null;
    const j=await r.json();
    const text=atob(j.content.replace(/\n/g,''));
    return {data:JSON.parse(text), sha:j.sha};
  }catch(e){ console.warn('ghGet error',e); return null; }
}

async function ghPush(data){
  const gh=getGHConfig(); if(!gh) return false;
  try{
    // Pega SHA atual primeiro
    let sha='';
    try{
      const r=await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.path}`,
        {headers:{'Authorization':'token '+gh.token,'Accept':'application/vnd.github.v3+json'}});
      if(r.ok){ const j=await r.json(); sha=j.sha; }
    }catch{}
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const body={message:'wyc: update data',content,...(sha?{sha}:{})};
    const r=await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.path}`,
      {method:'PUT',headers:{'Authorization':'token '+gh.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    return r.ok;
  }catch(e){ console.warn('ghPush error',e); return false; }
}

// Carrega do GitHub e atualiza localStorage
async function syncFromGitHub(){
  try{
    const r=await fetch(DB_JSON_URL+'?t='+Date.now());
    if(r.ok){ const data=await r.json(); saveData(data); }
  }catch(e){ console.warn('syncFromGitHub error',e); }
}

// Salva local + envia para GitHub
async function saveAndSync(d){
  // Sempre inclui o auth no db.json para funcionar em qualquer dispositivo
  try{
    const authLocal = JSON.parse(localStorage.getItem(AUTH_KEY)||'null');
    if(authLocal) d.auth = authLocal;
  }catch{}
  saveData(d);
  const ok=await ghPush(d);
  if(!ok) console.warn('GitHub sync failed - saved locally only');
  return ok;
}

function getEmpresas(){ return loadData().empresas; }

async function registerScan(cartaoId){
  try{
    const d = loadData();
    const c = d.cartoes.find(x=>x.id===cartaoId);
    if(!c) return;
    c.scans = (c.scans||0) + 1;
    c.lastScan = Date.now();
    // Adiciona ao histórico de scans (guarda últimos 200)
    if(!c.scanLog) c.scanLog=[];
    c.scanLog.push({ts:Date.now(), ua: navigator.userAgent.slice(0,60)});
    if(c.scanLog.length>200) c.scanLog=c.scanLog.slice(-200);
    saveData(d);
    await ghPush(d);
  }catch(e){ console.warn('registerScan error',e); }
}

function cardUrl(id){
  // SEMPRE com barra no final antes do ? para evitar redirect do GitHub Pages
  // GitHub Pages redireciona /cartaonfc -> /cartaonfc/ e PERDE o ?card=ID
  const origin = window.location.origin;
  const path   = window.location.pathname.replace(/\/+$/, '') + '/';
  return origin + path + '?card=' + id;
}

async function hashPassword(p){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
function getAuthConfig(){
  // Primeiro tenta localStorage, depois tenta do db.json (syncado)
  try{
    const local = JSON.parse(localStorage.getItem(AUTH_KEY)||'null');
    if(local) return local;
    // Fallback: auth pode estar no campo auth do db.json
    const d = loadData();
    if(d.auth) return d.auth;
    return null;
  }catch{ return null; }
}
function saveAuthConfig(c){
  localStorage.setItem(AUTH_KEY,JSON.stringify(c));
  // Salva também dentro do db.json para outros dispositivos
  const d = loadData();
  d.auth = c;
  saveAndSync(d);
}
function isAuthenticated(){
  try{
    const s=JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null');
    if(!s) return false;
    if(Date.now()-s.ts>SESSION_TTL){ sessionStorage.removeItem(SESSION_KEY); return false; }
    return true;
  }catch{ return false; }
}
function setSession(){ sessionStorage.setItem(SESSION_KEY,JSON.stringify({ts:Date.now()})); }
function clearSession(){ sessionStorage.removeItem(SESSION_KEY); }

function buildHref(t,v){
  if(!v) return '#';
  if(t==='whatsapp'){ const c=v.replace(/\D/g,''); return 'https://wa.me/'+(c.startsWith('55')?c:'55'+c); }
  if(t==='email') return 'mailto:'+v;
  if(t==='telefone') return 'tel:'+v.replace(/\s/g,'');
  const cfg=typeConfig(t);
  if(cfg.prefix&&!v.startsWith('http')&&!v.startsWith(cfg.prefix)) return cfg.prefix+v;
  return v.startsWith('http')?v:'https://'+v;
}

// URL fixa do db.json público no GitHub
const DB_JSON_URL = 'https://raw.githubusercontent.com/wycconsultoria-create/site/main/cartaonfc/db.json';

async function fetchWithTimeout(url, ms=5000){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), ms);
  try{
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(timer);
    return r;
  }catch(e){
    clearTimeout(timer);
    throw e;
  }
}

async function init(){
  const params = new URLSearchParams(window.location.search);
  const cardId = params.get('card');
  if(cardId){
    showLoading('Carregando cartão...');
    // Tenta buscar db.json com timeout de 5s — se falhar usa localStorage
    try{
      const r = await fetchWithTimeout(DB_JSON_URL + '?t=' + Date.now(), 5000);
      if(r.ok){
        const data = await r.json();
        saveData(data);
      }
    }catch(e){ console.warn('db.json fetch failed (usando cache local):', e.message); }
    // SEMPRE renderiza, mesmo se fetch falhou
    renderPublicCard(cardId);
    return;
  }
  // Painel admin: busca db.json primeiro para pegar auth config de qualquer dispositivo
  showLoading('Verificando acesso...');
  try{
    const r = await fetchWithTimeout(DB_JSON_URL + '?t=' + Date.now(), 5000);
    if(r.ok){
      const data = await r.json();
      saveData(data);
      // Se db.json tem auth config, salva no localStorage deste dispositivo
      if(data.auth) localStorage.setItem(AUTH_KEY, JSON.stringify(data.auth));
    }
  }catch(e){ console.warn('auth sync failed, using local cache'); }

  const app = document.getElementById('app');
  app.className = '';
  app.innerHTML = '';
  isAuthenticated()?renderDashboard():renderLogin(renderDashboard);
}

function handleFotoUpload(input){ const file=input.files[0]; if(!file)return; const r=new FileReader(); r.onload=ev=>{ document.getElementById('f-foto').value=ev.target.result; document.getElementById('foto-prev').innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`; }; r.readAsDataURL(file); }

function updateContato(id,field,val){

function saveCartaoForm(){

async function openQrModal(cartaoId){
  const c=getCartao(cartaoId); if(!c){ toast('Cartão não encontrado','error'); return; }
  const url=cardUrl(cartaoId);
  const ov=openModal(`
    <div class="modal-header"><h3 class="modal-title">📲 QR Code</h3><button class="modal-close">×</button></div>
    <div style="text-align:center">
      <p style="color:var(--text-secondary);margin-bottom:4px">Cartão de <strong style="color:var(--text-primary)">${esc(c.nome)}</strong></p>
      <div class="qr-canvas-wrapper"><canvas id="qr-cv"></canvas></div>
      <div class="qr-url">${esc(url)}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="copyLink('${esc(url)}')">📋 Copiar Link</button>
        <button class="btn btn-secondary" onclick="printQr('${esc(c.nome)}','${esc(c.cargo||'')}','${esc(c.empresa||'')}','${esc(url)}')">🖨️ Imprimir</button>
        <a href="${esc(url)}" target="_blank" class="btn btn-primary">🌐 Abrir</a>
      </div>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:.72rem;color:var(--text-muted)">Escaneie para abrir no celular</div>`);
  if(typeof QRCode!=='undefined'){
    await QRCode.toCanvas(document.getElementById('qr-cv'),url,{width:220,margin:2,color:{dark:'#000000',light:'#ffffff'}});
  }
}
async function copyLink(url){ try{ await navigator.clipboard.writeText(url); toast('Link copiado! 📋'); }catch{ toast('Não foi possível copiar','error'); } }
function printQr(nome,cargo,empresa,url){
  const cv=document.getElementById('qr-cv'); const img=cv?cv.toDataURL():'';
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>QR - ${nome}</title><style>body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;background:#fff}img{width:240px;height:240px}h2{margin:16px 0 4px}p{color:#555;font-size:.85rem;margin:2px 0}.url{font-size:.7rem;color:#888;margin-top:12px;word-break:break-all;max-width:280px;text-align:center}@media print{body{-webkit-print-color-adjust:exact}}</style></head><body><img src="${img}"><h2>${nome}</h2>${cargo?`<p>${cargo}</p>`:''} ${empresa?`<p style="color:#2563eb">${empresa}</p>`:''}<div class="url">${url}</div><script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

  // Build per-empresa stats
  const empStats=empresas.map(e=>{
    const ec=cartoes.filter(c=>c.empresaId===e.id);
    const scans=ec.reduce((s,c)=>s+(c.scans||0),0);
    return {...e, cartoes:ec, totalScans:scans};

    const end=new Date(d); end.setHours(23,59,59,999);
    let count=0;
    cartoes.forEach(c=>(c.scanLog||[]).forEach(s=>{ if(s.ts>=start.getTime()&&s.ts<=end.getTime()) count++; }));

              ${c.foto?`<img src="${esc(c.foto)}" style="width:100%;height:100%;object-fit:cover">`:initials(c.nome||'?')}

            <div>

function exportCSV(){
  const cartoes=getCartoes();
  const empresas=getEmpresas();
  const rows=[['Empresa','Cartão','Cargo','Tipo','Scans','Último Scan']];
  cartoes.forEach(c=>{
    const e=empresas.find(x=>x.id===c.empresaId);
    rows.push([
      e?.name||'—',
      c.nome||'—',
      c.cargo||'—',
      c.tipo||'profissional',
      c.scans||0,
      c.lastScan?new Date(c.lastScan).toLocaleString('pt-BR'):'—'
    ]);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='wyc-connect-analytics-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exportado! ⬇️');
}

// ── PUBLIC CARD ───────────────────────────────────────────
function buildVCard(c){
  const lines=['BEGIN:VCARD','VERSION:3.0'];
  lines.push('FN:'+( c.nome||''));
  if(c.cargo) lines.push('TITLE:'+c.cargo);
  if(c.empresa) lines.push('ORG:'+c.empresa);
  (c.contatos||[]).forEach(ct=>{
    if(ct.tipo==='email')    lines.push('EMAIL:'+ct.valor);
    if(ct.tipo==='telefone') lines.push('TEL:'+ct.valor);
    if(ct.tipo==='whatsapp') lines.push('TEL;TYPE=CELL:'+ct.valor);
    if(ct.tipo==='site')     lines.push('URL:'+ct.valor);
  });
  if(c.bio) lines.push('NOTE:'+c.bio);
  lines.push('END:VCARD');
  return lines.join('\n');
}

function downloadVCard(cardId){
  const c=getCartao(cardId); if(!c) return;
  const blob=new Blob([buildVCard(c)],{type:'text/vcard'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(c.nome||'contato').replace(/\s+/g,'_')+'.vcf';
  a.click();
}

async function shortenUrl(url){
  try{
    const r=await fetchWithTimeout('https://tinyurl.com/api-create.php?url='+encodeURIComponent(url),4000);
    if(r.ok){const t=await r.text();if(t.startsWith('http'))return t.trim();}
  }catch{}
  return url;
}

async function shareCard(cardId){
  const c=getCartao(cardId); if(!c) return;
  const url=await shortenUrl(cardUrl(cardId));
  const text=(c.nome||'')+(c.empresa?' — '+c.empresa:'');
  if(navigator.share){
    try{await navigator.share({title:c.nome,text,url});return;}catch(e){if(e.name==='AbortError')return;}
  }
  try{await navigator.clipboard.writeText(url);toast('Link copiado! 📋');}catch{toast('Não foi possível compartilhar','error');}
}
