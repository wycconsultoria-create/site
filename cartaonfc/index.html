<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wyc Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
:root{
  --bg-primary:#f0f4fb;--bg-secondary:#ffffff;--bg-card:#f8faff;--bg-card-hover:#eef2fc;
  --border:rgba(59,130,246,.18);--border-focus:rgba(59,130,246,.55);
  --accent:#2563eb;--accent-glow:rgba(37,99,235,.25);--accent-2:#6366f1;
  --text-primary:#0f172a;--text-secondary:#334155;--text-muted:#64748b;
  --success:#16a34a;--danger:#dc2626;--warning:#d97706;
  --radius-sm:6px;--radius-md:12px;--radius-lg:20px;--radius-xl:28px;
  --shadow-card:0 2px 12px rgba(37,99,235,.07);
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --sidebar-w:240px;--topbar-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-secondary)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700}
h2{font-size:1.5rem}h3{font-size:1.15rem}
p{color:var(--text-secondary)}a{text-decoration:none;color:inherit}
#app{display:flex;min-height:100vh}
#app.fullscreen{display:block}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:.85rem;color:#fff}
.logo-text{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--text-primary)}
.logo-text span{color:var(--accent)}
.sidebar-section-label{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:0 20px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text-secondary);transition:all .2s;font-weight:500}
.nav-item:hover{background:var(--bg-card);color:var(--text-primary)}
.nav-item.active{background:rgba(37,99,235,.1);color:var(--accent);border-right:3px solid var(--accent)}
.nav-icon{font-size:1.1rem;min-width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:16px 20px 0;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-card);border-radius:var(--radius-md);cursor:pointer;transition:background .2s;margin-bottom:8px}
.user-card:hover{background:var(--bg-card-hover)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#fff;flex-shrink:0}
.user-info{flex:1;overflow:hidden}
.user-name{font-weight:600;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-email{font-size:.7rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-logout{width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;border:1px solid rgba(220,38,38,.2);background:rgba(220,38,38,.06);color:#dc2626;font-family:var(--font-body);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:rgba(220,38,38,.12)}

/* MAIN */
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);z-index:50}
.topbar-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700}
.topbar-subtitle{font-size:.8rem;color:var(--text-muted)}
.topbar-actions{margin-left:auto;display:flex;gap:10px}
.menu-btn{display:none;background:none;border:none;cursor:pointer;font-size:1.4rem;padding:4px;color:var(--text-primary);flex-shrink:0}
.page-content{padding:28px;flex:1}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-card)}
.empresa-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;display:flex;flex-direction:column;gap:14px;transition:all .2s;box-shadow:var(--shadow-card)}
.empresa-card:hover{border-color:var(--border-focus);box-shadow:0 6px 20px rgba(37,99,235,.12);transform:translateY(-2px)}
.empresa-card-top{display:flex;align-items:center;gap:12px}
.empresa-card-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.empresa-avatar{width:48px;height:48px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff;flex-shrink:0;overflow:hidden}
.empresa-info{flex:1;overflow:hidden}
.empresa-name{font-weight:700;font-size:1rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empresa-email{font-size:.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empresa-badge{font-size:.68rem;font-weight:600;background:rgba(22,163,74,.12);color:var(--success);border:1px solid rgba(22,163,74,.25);padding:2px 8px;border-radius:99px}
.empresa-actions{display:flex;gap:6px;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-family:var(--font-body);font-weight:600;font-size:.82rem;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(37,99,235,.3)}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-focus);color:var(--text-primary)}
.btn-danger{background:rgba(220,38,38,.1);color:var(--danger);border:1px solid rgba(220,38,38,.25)}
.btn-danger:hover{background:rgba(220,38,38,.2)}
.btn-icon{width:32px;height:32px;padding:0;border-radius:var(--radius-sm)}
.btn-sm{padding:6px 12px;font-size:.78rem}

/* FORMS */
.form-group{margin-bottom:16px}
.form-label{display:block;font-weight:600;font-size:.75rem;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text-primary);font-family:var(--font-body);font-size:.88rem;transition:border-color .2s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.form-select{appearance:none;cursor:pointer}
.form-textarea{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:slideUp .25s ease}
.modal-wide{max-width:720px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.3rem;line-height:1;padding:4px;transition:color .2s}
.modal-close:hover{color:var(--text-primary)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}

/* CONTACT ITEM */
.contact-item{display:grid;grid-template-columns:160px 1fr 1fr auto;gap:10px;align-items:center;padding:12px 16px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:8px}
.contact-item:hover{border-color:var(--border-focus)}
.contact-type-badge{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);font-weight:600;font-size:.75rem;border:1px solid}
.contact-remove{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem;transition:color .2s;padding:4px}
.contact-remove:hover{color:var(--danger)}

/* PUBLIC CARD */
.public-card-wrapper{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;padding:24px;background:linear-gradient(135deg,#0a0f1e 0%,#0f172a 50%,#0a0f1e 100%)}
.public-card{width:100%;max-width:360px;background:#1e293b;border-radius:var(--radius-xl);overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.08);animation:cardAppear .5s ease forwards}
.public-card-header{padding:36px 28px 24px;text-align:center;background:linear-gradient(180deg,rgba(37,99,235,.1) 0%,transparent 100%)}
.public-card-avatar{width:88px;height:88px;border-radius:50%;margin:0 auto 16px;border:3px solid var(--accent);object-fit:cover;box-shadow:0 0 0 4px rgba(37,99,235,.2);display:block}
.public-card-avatar-placeholder{width:88px;height:88px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:2rem;color:#fff;border:3px solid var(--accent);box-shadow:0 0 0 4px rgba(37,99,235,.2)}
.public-card-name{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:#f1f5f9;line-height:1.2;margin-bottom:4px}
.public-card-company{font-size:.85rem;color:#94a3b8;margin-bottom:4px}
.public-card-bio{font-size:.82rem;color:#94a3b8;line-height:1.5;margin-top:8px}
.public-card-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(37,99,235,.2);color:#93c5fd;border:1px solid rgba(37,99,235,.4);font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:99px;margin-bottom:12px}
.public-card-contacts{padding:0 20px 24px;display:flex;flex-direction:column;gap:10px}
.public-contact-btn{display:flex;align-items:center;gap:14px;padding:15px 20px;border-radius:12px;cursor:pointer;border:none;font-family:var(--font-body);font-weight:700;font-size:.92rem;transition:all .2s;text-align:left;width:100%;text-decoration:none}
.public-contact-btn:hover{opacity:.88;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.public-contact-btn:active{transform:scale(.97)}
.public-contact-icon{font-size:1.2rem;min-width:24px;text-align:center}
.public-contact-label{flex:1}
.public-contact-sublabel{font-size:.72rem;opacity:.75;font-weight:400;display:block}
.public-card-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);text-align:center;font-size:.7rem;color:#475569;display:flex;align-items:center;justify-content:center;gap:6px}

/* QR */
.qr-canvas-wrapper{background:#fff;border-radius:var(--radius-md);padding:20px;display:inline-block;margin:16px 0;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.qr-url{font-size:.72rem;color:var(--text-muted);background:var(--bg-primary);padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);word-break:break-all;font-family:monospace;margin-bottom:16px}

/* TOAST */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 18px;font-size:.84rem;font-weight:500;box-shadow:var(--shadow-card);animation:slideInRight .3s ease;min-width:240px}
.toast.success{border-color:rgba(22,163,74,.4)}.toast.error{border-color:rgba(220,38,38,.4)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;grid-column:1/-1}
.empty-state-icon{font-size:3rem;opacity:.3}
.empty-state-title{font-family:var(--font-display);font-size:1.2rem}
.empty-state-text{color:var(--text-muted);max-width:320px;font-size:.88rem}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.urgency-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(220,38,38,.12);color:var(--danger);border:1px solid rgba(220,38,38,.3);border-radius:var(--radius-sm);padding:3px 8px;font-size:.68rem;font-weight:700}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.color-swatch:hover,.color-swatch.selected{border-color:#fff;transform:scale(1.15);box-shadow:0 0 0 2px var(--accent)}
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:var(--bg-primary);border-radius:var(--radius-md);padding:4px;margin-bottom:24px}
.tab{flex:1;padding:8px 14px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text-secondary);font-family:var(--font-body);font-weight:600;font-size:.82rem;cursor:pointer;transition:all .2s}
.tab.active{background:var(--bg-secondary);color:var(--text-primary);box-shadow:var(--shadow-card)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes cardAppear{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}

.mt-4{margin-top:16px}.mb-4{margin-bottom:16px}.w-full{width:100%}.text-center{text-align:center}
.text-sm{font-size:.82rem}.text-xs{font-size:.72rem}.text-muted{color:var(--text-muted)}.font-bold{font-weight:700}

/* ── Mobile ── */
@media(max-width:768px){
  /* Sidebar vira drawer — oculta por padrão */
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;box-shadow:none}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.18)}
  /* Overlay escuro quando sidebar aberta */
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  .sidebar-overlay.open{display:block}
  /* Conteúdo ocupa tela toda */
  .main-content{margin-left:0!important}
  /* Topbar mobile */
  .topbar{padding:0 16px;gap:10px}
  .topbar-title{font-size:1rem}
  .topbar-subtitle{display:none}
  /* Botão hamburguer */
  .menu-btn{display:flex!important}
  /* Cards em coluna única */
  .contact-item{grid-template-columns:1fr;grid-template-rows:auto}
  .form-grid{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr}
  /* Editor em coluna única */
  .page-content [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
  /* Topbar actions wrap */
  .topbar-actions{gap:6px}
  .topbar-actions .btn{font-size:.72rem;padding:7px 10px}
}
/* ── Profile tabs ── */
.profile-tabs{display:flex;gap:0;padding:0 20px;margin-bottom:4px}
.profile-tab{flex:1;padding:10px 8px;border:none;background:transparent;font-family:var(--font-body);font-weight:600;font-size:.82rem;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.profile-tab.active{color:#93c5fd;border-bottom-color:#3b82f6}
/* ── Public Card Actions ── */
.public-card-actions{display:flex;gap:8px;padding:0 20px 20px}
.public-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 8px;border-radius:var(--radius-md);border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#cbd5e1;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font-body);text-decoration:none}
.public-action-btn:hover{background:rgba(255,255,255,.1);color:#f1f5f9;transform:translateY(-1px)}
.public-action-btn:active{transform:scale(.97)}
.scan-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:99px;padding:3px 10px;font-size:.68rem;color:#64748b;margin-bottom:10px}
.install-banner{margin:0 20px 16px;padding:12px 14px;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.25);border-radius:var(--radius-md);display:flex;align-items:flex-start;gap:10px}
.install-banner-text{flex:1;font-size:.74rem;color:#93c5fd;line-height:1.5}
.install-banner-close{background:none;border:none;color:#475569;cursor:pointer;font-size:.9rem;padding:2px;line-height:1;flex-shrink:0;margin-top:2px}
</style>

<body>
<div id="app"></div>

<script>
// =========================================================
//  WYC CONNECT – Single File Bundle
// =========================================================

// ── STORE ─────────────────────────────────────────────────
// Dados ficam no localStorage E num arquivo db.json no GitHub
// O db.json é lido publicamente (cartões) e escrito via API token (admin)
const STORE_KEY   = 'wyc_connect_data';
const AUTH_KEY    = 'wyc_auth';
const SESSION_KEY = 'wyc_session';
const SESSION_TTL = 8 * 60 * 60 * 1000;
const DEFAULT_DATA = { user:{ name:'Usuário WYC', email:'' }, empresas:[], cartoes:[] };

// ── FIREBASE ─────────────────────────────────────────────
// SDK via CDN — sem npm, sem build
let _db = null; // Firestore instance

async function initFirebase(){
  if(_db) return _db;
  try{
    const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getFirestore } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const cfg = {
      apiKey:            "AIzaSyBNKv2-4oFu1_Pk-rImfeKfkS3ZPVGBktE",
      authDomain:        "wyc-connect.firebaseapp.com",
      projectId:         "wyc-connect",
      storageBucket:     "wyc-connect.firebasestorage.app",
      messagingSenderId: "689075693127",
      appId:             "1:689075693127:web:264d489277de4d92a53362"
    };
    const app = getApps().length ? getApps()[0] : initializeApp(cfg);
    _db = getFirestore(app);
    return _db;
  }catch(e){ console.error('Firebase init error',e); return null; }
}

// Comprime imagem para caber no Firestore (máx ~200KB)
function compressImage(base64DataUrl, maxWidth=320, quality=0.72){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if(w > maxWidth){ h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const result = canvas.toDataURL('image/jpeg', quality);
      console.log('Compressão:', Math.round(base64DataUrl.length/1024)+'KB →', Math.round(result.length/1024)+'KB');
      resolve(result);
    };
    img.onerror = ()=> resolve(base64DataUrl);
    img.src = base64DataUrl;
  });
}

async function fbLoad(){
  try{
    const db = await initFirebase(); if(!db) return null;
    const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    // Carrega 3 documentos separados para evitar limite de 1MB
    const [snapCfg, snapEmp, snapCart] = await Promise.all([
      getDoc(doc(db,'wyc','config')),
      getDoc(doc(db,'wyc','empresas')),
      getDoc(doc(db,'wyc','cartoes')),
    ]);
    const cfg   = snapCfg.exists()   ? snapCfg.data()   : {};
    const emps  = snapEmp.exists()   ? snapEmp.data()   : {};
    const carts = snapCart.exists()  ? snapCart.data()  : {};
    return {
      ...cfg,
      empresas: emps.list  || [],
      cartoes:  carts.list || [],
    };
  }catch(e){
    console.error('fbLoad error:', e.code, e.message);
    return null;
  }
}

function cleanForFirestore(obj, depth=0){
  if(obj === null || obj === undefined) return null;
  if(typeof obj === 'string'){
    // Firestore tem limite de 1MB por doc — base64 > 250KB é perigoso
    if(obj.startsWith('data:image') && obj.length > 250000){
      console.warn('Imagem grande demais para Firestore:', Math.round(obj.length/1024)+'KB');
      toast('⚠️ Imagem muito grande — redimensione antes de salvar','error');
      return ''; // remove para não quebrar o doc
    }
    return obj;
  }
  if(typeof obj === 'number' || typeof obj === 'boolean') return obj;
  if(Array.isArray(obj)) return obj.map(item => cleanForFirestore(item, depth+1));
  if(typeof obj === 'object'){
    const clean = {};
    for(const [k,v] of Object.entries(obj)){
      if(v === undefined) continue;
      clean[k] = cleanForFirestore(v, depth+1);
    }
    return clean;
  }
  return obj;
}

async function fbSave(data){
  try{
    const db = await initFirebase();
    if(!db){ console.error('Firebase não inicializou'); return false; }
    const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    // Separa em 3 documentos para evitar limite de 1MB por doc
    // doc 1: config (auth, user, planos) — pequeno
    const cfgData = cleanForFirestore({
      auth:  data.auth  || null,
      user:  data.user  || {},
    });
    // doc 2: empresas (com logos) — médio
    const empData = cleanForFirestore({ list: data.empresas || [] });
    // doc 3: cartoes (com fotos) — maior
    const cartData = cleanForFirestore({ list: data.cartoes || [] });

    await Promise.all([
      setDoc(doc(db,'wyc','config'),  cfgData),
      setDoc(doc(db,'wyc','empresas'), empData),
      setDoc(doc(db,'wyc','cartoes'),  cartData),
    ]);
    return true;
  }catch(e){
    console.error('fbSave error:', e.code, e.message);
    if(e.code==='permission-denied'){
      toast('🔒 Firebase: permissão negada. Verifique as Regras do Firestore.','error');
    } else if(e.code==='unavailable'){
      toast('📡 Firebase offline. Dado salvo localmente.','error');
    } else {
      toast('⚠️ Firebase: '+e.message,'error');
    }
    return false;
  }
}

// ── Leitura local (síncrona — cache) ─────────────────────
function loadData(){
  try{ const r=localStorage.getItem(STORE_KEY); return r?{...JSON.parse(JSON.stringify(DEFAULT_DATA)),...JSON.parse(r)}:JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  catch{ return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData(d){ localStorage.setItem(STORE_KEY,JSON.stringify(d)); }

// Salva local + Firebase em tempo real (sem precisar clicar em Sync)
async function saveAndSync(d){
  try{
    const authLocal = JSON.parse(localStorage.getItem(AUTH_KEY)||'null');
    if(authLocal) d.auth = authLocal;
  }catch{}
  saveData(d); // cache local imediato — UI já atualiza
  // Firebase em background — não bloqueia a UI
  fbSave(d).then(ok=>{
    if(!ok) toast('⚠️ Erro ao salvar na nuvem. Verifique conexão.','error');
  }).catch(()=> toast('⚠️ Sem conexão. Dado salvo localmente.','error'));
  return true; // retorna true imediatamente para não travar a UI
}

}

}

async function registerScan(cartaoId){
  try{
    // Carrega dados frescos do Firebase para garantir que temos o cartão
    let d = loadData();
    let c = d.cartoes.find(x=>x.id===cartaoId||x.slug===cartaoId);
    if(!c){
      // Tenta buscar do Firebase (celular sem localStorage)
      const remote = await fbLoad();
      if(remote){ saveData(remote); d = remote; }
      c = d.cartoes.find(x=>x.id===cartaoId||x.slug===cartaoId);
      if(!c){ console.warn('registerScan: cartão não encontrado', cartaoId); return; }
    }
    c.scans = (c.scans||0) + 1;
    c.lastScan = Date.now();
    if(!c.scanLog) c.scanLog=[];
    c.scanLog.push({ts:Date.now()});
    if(c.scanLog.length>500) c.scanLog=c.scanLog.slice(-500);
    saveData(d);
    await fbSave(d);
  }catch(e){ console.warn('registerScan error',e); }
}

function cardUrl(idOrSlug){
  // Usa slug personalizado se disponível, senão usa id
  const c = loadData().cartoes.find(x=>x.id===idOrSlug||x.slug===idOrSlug);
  const key = (c&&c.slug) ? c.slug : idOrSlug;
  const origin = window.location.origin;
  const path   = window.location.pathname.replace(/\/+$/, '') + '/';
  return origin + path + '?card=' + key;
}

async function hashPassword(p){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

  try{
    const local = JSON.parse(localStorage.getItem(AUTH_KEY)||'null');
    if(local) return local;
    // Fallback: auth pode estar no campo auth do db.json
    const d = loadData();
    if(d.auth) return d.auth;
    return null;
  }catch{ return null; }
}
function saveAuthConfig(c){
  localStorage.setItem(AUTH_KEY,JSON.stringify(c));

  const d = loadData();
  d.auth = c;
  saveAndSync(d);
}

    return true;
  }catch{ return false; }
}

}

async function init(){
  const params      = new URLSearchParams(window.location.search);
  const cardId      = params.get('card');
  const empresaSlug = params.get('empresa');

  // ── Cartão público ou portal empresa ─────────────────────
  if(cardId || empresaSlug){
    showLoading('Carregando...');
    try{
      const remote = await fbLoad();
      if(remote){ saveData(remote); }
    }catch(e){ console.warn('Firebase load failed, using cache'); }
    if(empresaSlug) renderEmpresaPortal(empresaSlug);
    else             renderPublicCard(cardId);
    return;
  }

  // ── Painel admin ──────────────────────────────────────────
  showLoading('Conectando...');
  try{
    const remote = await fbLoad();
    if(remote){
      // Auth sempre vem da nuvem (login em qualquer dispositivo)
      if(remote.auth) localStorage.setItem(AUTH_KEY, JSON.stringify(remote.auth));
      // Dados: Firebase é a fonte da verdade
      saveData(remote);
    }
  }catch(e){ console.warn('Firebase load failed, using local cache'); }

  const app = document.getElementById('app');
  app.className = '';
  app.innerHTML = '';
  isAuthenticated() ? renderDashboard() : renderLogin(renderDashboard);
}

const PLAN_LIMITS={get free(){ return getPlanConfig().free.limit; }, get pro(){ return getPlanConfig().pro.limit; }, get business(){ return getPlanConfig().business.limit; }};
function selectPlan(el){
  document.querySelectorAll('.plan-opt').forEach(o=>{
    o.classList.remove('selected');
    o.style.borderColor='var(--border)';
    o.style.background='transparent';
  });
  el.classList.add('selected');
  const colors={free:'#64748b',pro:'#2563eb',business:'#7c3aed'};
  el.style.borderColor=colors[el.dataset.plan];
  el.style.background='rgba(37,99,235,.06)';
  document.getElementById('ep').value=el.dataset.plan;
}
function checkPlanAndCreate(eid){
  const emp=getEmpresas().find(e=>e.id===eid);
  const plano=emp?.plano||'free';
  const cfg=getPlanConfig();
  const limite=cfg[plano]?.limit||1;
  const atual=getCartoes(eid).length;
  if(atual>=limite){
    toast('Limite do plano '+plano.charAt(0).toUpperCase()+plano.slice(1)+' ('+limite+' cartões) atingido. Faça upgrade!','error');
    return;
  }
  renderCartaoEditor(null,eid);
}
async function handleLogoUpload(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    // Logo: max 200px, alta qualidade para preservar detalhes
    const compressed=await compressImage(ev.target.result,200,0.9);
    document.getElementById('elogo').value=compressed;
    document.getElementById('emp-logo-prev').innerHTML=`<img src="${compressed}" style="width:100%;height:100%;object-fit:contain;padding:4px">`;
    toast('✅ Logo pronta! ('+Math.round(compressed.length/1024)+'KB)','success');
  };
  reader.readAsDataURL(file);
}
function validateSlug(input){
  const s = input.value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
  input.value = s;
  const status = document.getElementById('slug-status');
  if(!s){ status.innerHTML=''; return; }
  const available = slugIsAvailable(s, _editId||'');
  status.innerHTML = available
    ? '<span style="color:var(--success)">✅ Disponível — link será: ?card='+s+'</span>'
    : '<span style="color:var(--danger)">❌ Este slug já está em uso</span>';
}
// syncNow mantido como utilitário interno (não aparece mais na UI)
async function syncNow(){
  const d = loadData();
  try{ const a=JSON.parse(localStorage.getItem(AUTH_KEY)||'null'); if(a) d.auth=a; }catch{}
  return await fbSave(d);
}

    cartoes.map(c=>{ const ce=getEmpresas().find(e=>e.id===c.empresaId); const tipos=[...new Set((c.contatos||[]).map(x=>x.tipo))]; const icons=tipos.slice(0,5).map(t=>typeConfig(t).icon).join(' ');
    return `<div class="empresa-card">
      <div class="empresa-card-top">
        <div class="empresa-avatar" style="background:${c.foto?'#f8faff':c.cor||'linear-gradient(135deg,#2563eb,#6366f1)'}">

            ?`<img src="${esc(c.foto)}" style="width:100%;height:100%;object-fit:cover">`
            :ce?.logo
              ?`<img src="${esc(ce.logo)}" style="width:100%;height:100%;object-fit:contain;padding:4px">`
              :initials(c.nome||'?')}
        </div>
        <div class="empresa-info"><div class="empresa-name">${esc(c.nome||'Sem nome')}</div>
        <div class="empresa-email">${c.cargo?esc(c.cargo):''}${c.cargo&&ce?' · ':''}${ce?esc(ce.name):''}</div></div>
        ${c.tipo==='idoso'?'<span class="urgency-badge">🧓</span>':''}
      </div>
      <div class="empresa-card-bottom">
        <span style="font-size:.73rem;color:var(--text-muted)">${icons||'—'} ${(c.contatos||[]).length} contato(s) &nbsp;·&nbsp; 👁️ ${c.scans||0} scan${(c.scans||0)!==1?'s':''}</span>
        <div class="empresa-actions">
          <button class="btn btn-secondary btn-sm" style="padding:5px 10px;font-size:.75rem" onclick="openQrModal('${c.id}')">📲 QR</button>
          <button class="btn btn-secondary btn-icon btn-sm" onclick="renderCartaoEditor('${c.id}','${eid||''}')" title="Editar">✏️</button>

  app.innerHTML=`${buildSidebar('')}

function setTipo(t){

function autoFillEmpresa(sel){ const e=getEmpresas().find(x=>x.id===sel.value); if(e) document.getElementById('f-empresa').value=e.name; }
function selectColor(el,color){ document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected')); el.classList.add('selected'); _selectedColor=color; }
function selectBgCor(val){
  document.querySelectorAll('[id^="bgcor-"]').forEach(el=>el.style.border='3px solid transparent');
  const el=document.getElementById('bgcor-'+val);
  if(el) el.style.border='3px solid #fff';
  document.getElementById('f-bgcor').value=val;
}
async function handleFotoUpload(field){
  const input = event.target;
  const file = input.files[0]; if(!file) return;
  const fieldId = field==='banner' ? 'f-banner' : 'f-foto';
  const prevId  = field==='banner' ? 'banner-prev' : 'foto-prev';
  const maxW    = field==='banner' ? 800 : 320;

  const reader = new FileReader();
  reader.onload = async ev => {
    const inp = document.getElementById(fieldId);
    if(inp){ inp.value='Comprimindo...'; inp.disabled=true; }
    // Comprime para caber no Firestore (< 200KB)
    const compressed = await compressImage(ev.target.result, maxW, 0.75);
    // Preview
    const prevEl = document.getElementById(prevId);
    if(prevEl) prevEl.innerHTML=`<img src="${compressed}" style="width:100%;height:100%;object-fit:cover">`;
    // Salva no campo
    if(inp){ inp.value=compressed; inp.disabled=false; }
    toast('✅ Imagem pronta! ('+Math.round(compressed.length/1024)+'KB)','success');
  };
  reader.readAsDataURL(file);
}

async function openQrModal(cartaoId){
  const c=getCartao(cartaoId); if(!c){ toast('Cartão não encontrado','error'); return; }
  const url=cardUrl(cartaoId);
  const ov=openModal(`
    <div class="modal-header"><h3 class="modal-title">📲 QR Code</h3><button class="modal-close">×</button></div>
    <div style="text-align:center">
      <p style="color:var(--text-secondary);margin-bottom:4px">Cartão de <strong style="color:var(--text-primary)">${esc(c.nome)}</strong></p>
      <div class="qr-canvas-wrapper"><canvas id="qr-cv"></canvas></div>
      <div class="qr-url">${esc(url)}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="copyLink('${esc(url)}')">📋 Copiar Link</button>
        <button class="btn btn-secondary" onclick="printQr('${esc(c.nome)}','${esc(c.cargo||'')}','${esc(c.empresa||'')}','${esc(url)}')">🖨️ Imprimir</button>
        <a href="${esc(url)}" target="_blank" class="btn btn-primary">🌐 Abrir</a>
      </div>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:.72rem;color:var(--text-muted)">Escaneie para abrir no celular</div>`);
  if(typeof QRCode!=='undefined'){
    await QRCode.toCanvas(document.getElementById('qr-cv'),url,{width:220,margin:2,color:{dark:'#000000',light:'#ffffff'}});
  }
}
async function copyLink(url){ try{ await navigator.clipboard.writeText(url); toast('Link copiado! 📋'); }catch{ toast('Não foi possível copiar','error'); } }
function printQr(nome,cargo,empresa,url){
  const cv=document.getElementById('qr-cv'); const img=cv?cv.toDataURL():'';
  const w=window.open('','_blank');

function savePlanLimit(key){
  const cfg = getPlanConfig();
  const limitVal = parseInt(document.getElementById('limit-'+key)?.value)||1;

function changeEmpresaPlan(empId, newPlan){
  const d = loadData();
  const e = d.empresas.find(x=>x.id===empId);
  if(!e) return;
  e.plano = newPlan;
  saveAndSync(d);
  toast('Plano atualizado para '+newPlan+'! ✅');
  // Rebuid just the empresa rows without full re-render
  setTimeout(()=>renderPlanos(), 300);
}

// ── ANALYTICS ─────────────────────────────────────────────
function renderAnalytics(filtroEmpresaId=''){
  const app=document.getElementById('app'); app.className='';
  const empresas=getEmpresas();
  const todosCartoes=getCartoes();

  // Aplica filtro de empresa
  const cartoesFiltrados = filtroEmpresaId
    ? todosCartoes.filter(c=>c.empresaId===filtroEmpresaId)
    : todosCartoes;

  const totalScans=cartoesFiltrados.reduce((s,c)=>s+(c.scans||0),0);

  // Stats por empresa (sempre mostra todas para o filtro, mas detalha só a selecionada)
  const empStats=empresas.map(e=>{
    const ec=cartoesFiltrados.filter(c=>c.empresaId===e.id);
    const scans=ec.reduce((s,c)=>s+(c.scans||0),0);
    return {...e, cartoes:ec, totalScans:scans};
  }).filter(e=> filtroEmpresaId ? e.id===filtroEmpresaId : true)
    .sort((a,b)=>b.totalScans-a.totalScans);

  function fmtDate(ts){ if(!ts)return '—'; return new Date(ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

  // Chart — últimos 14 dias (filtrado por empresa)
  const days=14;
  const dayLabels=[];
  const dayData=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    dayLabels.push(d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}));
    const start=new Date(d); start.setHours(0,0,0,0);
    const end=new Date(d); end.setHours(23,59,59,999);
    let count=0;
    cartoesFiltrados.forEach(c=>(c.scanLog||[]).forEach(s=>{
      if(s.ts>=start.getTime()&&s.ts<=end.getTime()) count++;
    }));
    dayData.push(count);
  }
  const maxDay=Math.max(...dayData,1);
  const barW=Math.floor(520/days)-2;
  const bars=dayData.map((v,i)=>{
    const h=Math.max(4,Math.round((v/maxDay)*60));
    const lbl=dayLabels[i];
    return `<g>
      <rect x="${i*(barW+2)}" y="${60-h}" width="${barW}" height="${h}" rx="3" fill="${v>0?'#2563eb':'#e2e8f0'}"/>
      <text x="${i*(barW+2)+barW/2}" y="76" text-anchor="middle" font-size="7" fill="${v>0?'#94a3b8':'#cbd5e1'}">${lbl}</text>
      ${v>0?`<text x="${i*(barW+2)+barW/2}" y="${60-h-4}" text-anchor="middle" font-size="7" font-weight="bold" fill="#2563eb">${v}</text>`:''}
    </g>`;
  }).join('');

  // Filtro select options
  const empOptions=`<option value="">🌐 Todas as empresas</option>`+
    empresas.map(e=>`<option value="${e.id}" ${e.id===filtroEmpresaId?'selected':''}>${esc(e.name)}</option>`).join('');

  // Empresa rows
  const empresaRows=empStats.length===0
    ?'<p class="text-muted text-sm" style="padding:20px">Nenhum dado encontrado.</p>'
    :empStats.map(e=>{
      const empScans=e.totalScans;
      return `
      <div style="margin-bottom:16px;padding:16px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-md)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:40px;height:40px;border-radius:8px;background:${e.logo?'#f8faff':'linear-gradient(135deg,var(--accent),var(--accent-2))'};display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:.85rem;overflow:hidden;flex-shrink:0">
              ${e.logo?`<img src="${esc(e.logo)}" style="width:100%;height:100%;object-fit:contain;padding:3px">`:initials(e.name)}
            </div>
            <div>
              <div style="font-weight:700;font-size:.95rem">${esc(e.name)}</div>
              <div style="font-size:.72rem;color:var(--text-muted)">${e.cartoes.length} cartão(ões)</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:var(--accent)">${empScans}</div>
            <div style="font-size:.68rem;color:var(--text-muted)">scans totais</div>
          </div>
        </div>
        ${e.cartoes.length===0?'<p style="font-size:.78rem;color:var(--text-muted);padding:4px 0">Nenhum cartão nesta empresa.</p>':
          e.cartoes.map(c=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg-secondary);border-radius:8px;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
              <div style="width:32px;height:32px;border-radius:50%;background:${c.cor||'linear-gradient(135deg,#2563eb,#6366f1)'};display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0">
                ${c.foto?`<img src="${esc(c.foto)}" style="width:100%;height:100%;object-fit:cover">`:e.logo?`<img src="${esc(e.logo)}" style="width:100%;height:100%;object-fit:contain;padding:3px">`:initials(c.nome||'?')}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.nome||'Sem nome')}</div>
                <div style="font-size:.68rem;color:var(--text-muted)">Último: ${fmtDate(c.lastScan)}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
              <div style="text-align:right">
                <div style="font-weight:800;font-size:1.1rem;color:var(--accent)">${c.scans||0}</div>
                <div style="font-size:.62rem;color:var(--text-muted)">scans</div>
              </div>
              <div style="width:52px;height:6px;background:var(--border);border-radius:99px;overflow:hidden">
                <div style="width:${empScans>0?Math.min(100,Math.round(((c.scans||0)/empScans)*100)):0}%;height:100%;background:var(--accent);border-radius:99px"></div>
              </div>
            </div>
          </div>`).join('')}
      </div>`;
    }).join('');

  app.innerHTML=`${buildSidebar('analytics')}
  <div class="main-content">
    <div class="topbar">
      <button class="menu-btn" onclick="openSidebar()">☰</button>
      <div><div class="topbar-title">📊 Analytics</div><div class="topbar-subtitle">Scans de QR Code${filtroEmpresaId?' · '+esc(empresas.find(e=>e.id===filtroEmpresaId)?.name||''):''}</div></div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportCSV('${filtroEmpresaId}')">⬇️ CSV</button>
        <button class="btn btn-secondary" onclick="renderDashboard()">← Voltar</button>
      </div>
    </div>
    <div class="page-content">

      <!-- Filtro empresa -->
      <div class="card" style="margin-bottom:20px;padding:16px 20px">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <label style="font-size:.8rem;font-weight:700;color:var(--text-muted);white-space:nowrap">🔍 Filtrar por empresa:</label>
          <select class="form-select" style="flex:1;min-width:180px;max-width:320px"
            onchange="renderAnalytics(this.value)">
            ${empOptions}
          </select>
          ${filtroEmpresaId?`<button class="btn btn-secondary btn-sm" onclick="renderAnalytics('')">✕ Limpar filtro</button>`:''}
        </div>
      </div>

      <!-- KPIs -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:20px">
        <div class="card" style="text-align:center;padding:18px 12px">
          <div style="font-size:2rem;font-weight:800;font-family:var(--font-display);color:var(--accent)">${totalScans}</div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-top:4px">Total de Scans</div>
        </div>
        <div class="card" style="text-align:center;padding:18px 12px">
          <div style="font-size:2rem;font-weight:800;font-family:var(--font-display);color:var(--accent)">${cartoesFiltrados.length}</div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-top:4px">Cartões</div>
        </div>

function exportCSV(filtroEmpresaId=''){
  const allCartoes=getCartoes();
  const cartoes=filtroEmpresaId?allCartoes.filter(c=>c.empresaId===filtroEmpresaId):allCartoes;
  const empresas=getEmpresas();
  const rows=[['Empresa','Cartão','Cargo','Tipo','Scans','Último Scan']];
  cartoes.forEach(c=>{
    const e=empresas.find(x=>x.id===c.empresaId);
    rows.push([
      e?.name||'—',
      c.nome||'—',
      c.cargo||'—',
      c.tipo||'profissional',
      c.scans||0,
      c.lastScan?new Date(c.lastScan).toLocaleString('pt-BR'):'—'
    ]);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='wyc-connect-analytics-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exportado! ⬇️');
}

// ── PUBLIC CARD ───────────────────────────────────────────
function buildVCard(c){
  const lines=['BEGIN:VCARD','VERSION:3.0'];
  lines.push('FN:'+( c.nome||''));
  if(c.cargo) lines.push('TITLE:'+c.cargo);
  if(c.empresa) lines.push('ORG:'+c.empresa);
  (c.contatos||[]).forEach(ct=>{
    if(ct.tipo==='email')    lines.push('EMAIL:'+ct.valor);
    if(ct.tipo==='telefone') lines.push('TEL:'+ct.valor);
    if(ct.tipo==='whatsapp') lines.push('TEL;TYPE=CELL:'+ct.valor);
    if(ct.tipo==='site')     lines.push('URL:'+ct.valor);
  });
  if(c.bio) lines.push('NOTE:'+c.bio);
  lines.push('END:VCARD');
  return lines.join('\n');
}

function downloadVCard(cardId){
  const c=getCartao(cardId); if(!c) return;
  const blob=new Blob([buildVCard(c)],{type:'text/vcard'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(c.nome||'contato').replace(/\s+/g,'_')+'.vcf';
  a.click();
}

function switchPublicTab(t){
  document.getElementById('pub-contacts-1').style.display=t===1?'flex':'none';
  const c2=document.getElementById('pub-contacts-2');
  if(c2) c2.style.display=t===2?'flex':'none';
  const t1=document.getElementById('ptab1'), t2=document.getElementById('ptab2');
  if(t1){t1.classList.toggle('active',t===1);}
  if(t2){t2.classList.toggle('active',t===2);}
}
async function shareCard(cardId){
  const c=getCartao(cardId); if(!c) return;
  const url=cardUrl(cardId);
  const title=c.nome||'Cartão Digital';
  const text=(c.nome||'')+(c.empresa?' — '+c.empresa:'');

  // Tenta abrir menu nativo de compartilhamento (Android/iOS)
  if(navigator.share){
    try{
      await navigator.share({title, text, url});
      return;
    }catch(e){
      if(e.name==='AbortError') return; // usuário cancelou
      // Se falhar, cai no fallback abaixo
    }
  }
  // Fallback: copia o link
  try{
    await navigator.clipboard.writeText(url);
    toast('Link copiado! 📋');
  }catch{
    // Último recurso: abre em nova aba
    window.open(url,'_blank');
  }
}

function maybeShowInstallBanner(){
  if(sessionStorage.getItem('wyc_nb')) return '';
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid=/android/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
  if(isStandalone) return ''; // já é app, não mostra
  if(!isIOS&&!isAndroid) return ''; // desktop, não mostra
  const tip=isIOS
    ?'<strong>📲 Abrir sem barra de endereço:</strong> Toque em <strong>Compartilhar ↑</strong> (ícone na barra inferior do Safari) → <strong>"Adicionar à Tela de Início"</strong>'
    :'<strong>📲 Abrir sem barra de endereço:</strong> Toque nos <strong>3 pontos ⋮</strong> (canto superior direito do Chrome) → <strong>"Adicionar à tela inicial"</strong>';
  return `<div class="install-banner"><div class="install-banner-text">${tip}</div><button class="install-banner-close" onclick="sessionStorage.setItem('wyc_nb','1');this.closest('.install-banner').remove()">✕</button></div>`;
}
